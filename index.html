<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarStudio</title>

<style>

body{
background:#000;
font-family:Arial;
margin:0;
padding:20px;
}

/* CONTENEDOR */
.container{
max-width:420px;
margin:auto;
}

/* CARD */
.card{
background:#fff;
padding:25px;
border-radius:25px;
box-shadow:0 20px 50px rgba(0,0,0,0.6);
animation:fade 0.5s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1;}
}

/* LOGO TEXTO (SIN IMAGEN PARA QUE NUNCA FALLE) */
.logo{
text-align:center;
font-size:32px;
font-weight:bold;
color:#000;
margin-bottom:5px;
}

.sub{
text-align:center;
color:#555;
font-size:14px;
margin-bottom:5px;
}

.info{
text-align:center;
font-size:14px;
margin-bottom:15px;
}

/* INPUTS */
input{
width:100%;
padding:14px;
margin:8px 0;
border-radius:14px;
border:1px solid #ddd;
font-size:15px;
transition:0.2s;
}

input:focus{
outline:none;
border:1px solid #000;
}

/* BOTONES */
button{
width:100%;
padding:15px;
border:none;
border-radius:14px;
font-weight:bold;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

/* BOTÓN GENERAR */
.btn-main{
background:#000;
color:#fff;
}

/* WHATSAPP */
.btn-whatsapp{
background:#25D366;
color:#fff;
}

/* FACTURA */
.invoice{
display:none;
margin-top:20px;
}

.line{
border-top:1px solid #ccc;
margin:10px 0;
}

.total{
font-size:22px;
font-weight:bold;
}

/* PRINT */
@media print{
body{background:#fff;}
button{display:none;}
.card{box-shadow:none;}
}

</style>
</head>

<body>

<div class="container">

<!-- FORM -->
<div class="card">

<div class="logo">CARSTUDIO</div>
<div class="sub">Auto Electronics & Installation</div>
<div class="info">20 Prescott St, Jersey City</div>
<div class="info">📞 201-658-7295</div>

<input id="name" placeholder="Customer Name">
<input id="phone" placeholder="WhatsApp Number">
<input id="vehicle" placeholder="Vehicle">
<input id="plate" placeholder="Plate">
<input id="service" placeholder="Service">
<input id="amount" placeholder="Amount ($)">

<button class="btn-main" onclick="generate()">GENERATE INVOICE</button>

</div>

<!-- FACTURA -->
<div class="card invoice" id="invoice">

<div class="logo">CARSTUDIO</div>
<div class="sub">Auto Electronics & Installation</div>
<div class="info">20 Prescott St, Jersey City</div>
<div class="info">📞 201-658-7295</div>

<p><b>Invoice:</b> <span id="invoiceNum"></span></p>
<p><b>Date:</b> <span id="date"></span></p>

<div class="line"></div>

<p><b>Customer:</b> <span id="c1"></span></p>
<p><b>Phone:</b> <span id="c2"></span></p>
<p><b>Vehicle:</b> <span id="c3"></span></p>
<p><b>Plate:</b> <span id="c4"></span></p>

<div class="line"></div>

<p><b>Service:</b></p>
<p id="c5"></p>

<p class="total">TOTAL: $<span id="c6"></span></p>

<div class="line"></div>

<p style="text-align:center;font-size:12px;">
No refunds after service completed
</p>

<button class="btn-main" onclick="window.print()">PRINT</button>

<button class="btn-whatsapp" onclick="sendWhatsApp()">SEND WHATSAPP</button>

</div>

</div>

<script>

function generate(){

document.getElementById("invoice").style.display="block";

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let vehicle = document.getElementById("vehicle").value;
let plate = document.getElementById("plate").value;
let service = document.getElementById("service").value;
let amount = document.getElementById("amount").value;

document.getElementById("c1").innerText = name;
document.getElementById("c2").innerText = phone;
document.getElementById("c3").innerText = vehicle;
document.getElementById("c4").innerText = plate;
document.getElementById("c5").innerText = service;
document.getElementById("c6").innerText = amount;

let now = new Date();
document.getElementById("date").innerText = now.toLocaleString();

let num = Math.floor(Math.random()*900+100);
document.getElementById("invoiceNum").innerText = "REC-" + num;

}

function sendWhatsApp(){

let phone = document.getElementById("phone").value;

let message =
"CARSTUDIO AUTO SERVICE\n\n" +
"Invoice: " + document.getElementById("invoiceNum").innerText + "\n" +
"Date: " + document.getElementById("date").innerText + "\n\n" +
"Customer: " + document.getElementById("c1").innerText + "\n" +
"Vehicle: " + document.getElementById("c3").innerText + "\n" +
"Plate: " + document.getElementById("c4").innerText + "\n\n" +
"Service: " + document.getElementById("c5").innerText + "\n" +
"Total: $" + document.getElementById("c6").innerText + "\n\n" +
"Thank you for your business";

let url = "https://wa.me/1" + phone + "?text=" + encodeURIComponent(message);

window.open(url, "_blank");

}

</script>

</body>
</html>
