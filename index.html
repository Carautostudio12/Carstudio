<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CARSTUDIO</title>

<style>

body{
background:#000;
font-family:-apple-system, Arial;
margin:0;
padding:20px;
color:#111;
}

/* CONTENEDOR */
.container{
max-width:420px;
margin:auto;
}

/* CARD */
.card{
background:#fff;
padding:25px;
border-radius:18px;
box-shadow:0 25px 60px rgba(0,0,0,0.8);
margin-bottom:15px;
}

/* HEADER MARCA */
.brand{
text-align:center;
margin-bottom:20px;
}

.brand img{
width:60px;
margin-bottom:8px;
}

.brand-name{
font-size:22px;
font-weight:600;
letter-spacing:2px;
}

.brand-sub{
font-size:12px;
color:#777;
margin-top:3px;
}

.brand-info{
font-size:12px;
color:#555;
margin-top:6px;
}

/* INPUTS */
input{
width:100%;
padding:14px;
margin:6px 0;
border-radius:10px;
border:1px solid #e5e5e5;
font-size:14px;
}

input:focus{
outline:none;
border:1px solid #000;
}

/* BOTONES */
button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-weight:600;
font-size:15px;
cursor:pointer;
margin-top:10px;
}

/* BOTÓN PRINCIPAL */
.btn-main{
background:#000;
color:#fff;
}

/* WHATSAPP */
.btn-whatsapp{
background:#25D366;
color:#fff;
}

/* FACTURA */
.invoice{
display:none;
}

.line{
border-top:1px solid #eee;
margin:12px 0;
}

.row{
display:flex;
justify-content:space-between;
font-size:14px;
margin:4px 0;
}

.total{
font-size:20px;
font-weight:bold;
}

/* PRINT */
@media print{
body{background:#fff;}
button{display:none;}
.card{box-shadow:none;}
}

</style>
</head>

<body>

<div class="container">

<!-- FORM -->
<div class="card">

<div class="brand">
<img src="https://cdn-icons-png.flaticon.com/512/743/743922.png">
<div class="brand-name">CARSTUDIO</div>
<div class="brand-sub">Auto Electronics & Installation</div>
<div class="brand-info">20 Prescott St, Jersey City</div>
<div class="brand-info">201-658-7295</div>
</div>

<input id="name" placeholder="Customer Name">
<input id="phone" placeholder="WhatsApp Number">
<input id="vehicle" placeholder="Vehicle">
<input id="plate" placeholder="Plate">
<input id="service" placeholder="Service">
<input id="amount" placeholder="Amount ($)">

<button class="btn-main" onclick="generate()">Generate Invoice</button>

</div>

<!-- FACTURA -->
<div class="card invoice" id="invoice">

<div class="brand">
<img src="https://cdn-icons-png.flaticon.com/512/743/743922.png">
<div class="brand-name">CARSTUDIO</div>
<div class="brand-sub">Auto Electronics & Installation</div>
</div>

<div class="row"><b>Invoice</b><span id="invoiceNum"></span></div>
<div class="row"><b>Date</b><span id="date"></span></div>

<div class="line"></div>

<div class="row"><span>Customer</span><span id="c1"></span></div>
<div class="row"><span>Phone</span><span id="c2"></span></div>
<div class="row"><span>Vehicle</span><span id="c3"></span></div>
<div class="row"><span>Plate</span><span id="c4"></span></div>

<div class="line"></div>

<p><b>Service</b></p>
<p id="c5"></p>

<div class="line"></div>

<div class="row total">
<span>Total</span>
<span>$<span id="c6"></span></span>
</div>

<div class="line"></div>

<p style="text-align:center;font-size:11px;color:#888;">
No refunds after service completed
</p>

<button class="btn-main" onclick="window.print()">Print</button>
<button class="btn-whatsapp" onclick="sendWhatsApp()">Send WhatsApp</button>

</div>

</div>

<script>

function generate(){

document.getElementById("invoice").style.display="block";

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let vehicle = document.getElementById("vehicle").value;
let plate = document.getElementById("plate").value;
let service = document.getElementById("service").value;
let amount = document.getElementById("amount").value;

document.getElementById("c1").innerText = name;
document.getElementById("c2").innerText = phone;
document.getElementById("c3").innerText = vehicle;
document.getElementById("c4").innerText = plate;
document.getElementById("c5").innerText = service;
document.getElementById("c6").innerText = amount;

let now = new Date();
document.getElementById("date").innerText = now.toLocaleString();

let num = Math.floor(Math.random()*900+100);
document.getElementById("invoiceNum").innerText = "REC-" + num;

}

function sendWhatsApp(){

let phone = document.getElementById("phone").value;

let message =
"*CARSTUDIO AUTO SERVICE*\n\n" +
"Invoice: " + document.getElementById("invoiceNum").innerText + "\n" +
"Date: " + document.getElementById("date").innerText + "\n\n" +
"Customer: " + document.getElementById("c1").innerText + "\n" +
"Vehicle: " + document.getElementById("c3").innerText + "\n" +
"Plate: " + document.getElementById("c4").innerText + "\n\n" +
"Service: " + document.getElementById("c5").innerText + "\n" +
"Total: $" + document.getElementById("c6").innerText + "\n\n" +
"Thank you for your business";

let url = "https://wa.me/1" + phone + "?text=" + encodeURIComponent(message);

window.open(url, "_blank");

}

</script>

</body>
</html>
