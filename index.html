<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Studio Auto Service</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0B0B0B;
  color:white;
}

.container {
  max-width:500px;
  margin:auto;
  padding:20px;
}

.card {
  background:white;
  color:black;
  border-radius:18px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h2 {
  margin:0;
  letter-spacing:2px;
}

input {
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #ddd;
}

button {
  width:100%;
  padding:15px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  font-size:16px;
}

.gold {
  background:#C9A24A;
  color:black;
}

.whatsapp {
  background:#25D366;
  color:white;
}

.clear {
  background:#222;
  color:white;
}

hr {
  border:0;
  border-top:1px solid #eee;
  margin:15px 0;
}

/* PRINT MODE */
@media print {
  body {
    background:white;
  }

  .no-print {
    display:none;
  }

  .card {
    box-shadow:none;
    border-radius:0;
  }
}
</style>
</head>

<body>

<div class="container">

<!-- FORM -->
<div class="card no-print">

<h2 style="text-align:center;">CAR STUDIO AUTO SERVICE</h2>
<p style="text-align:center;color:#555;">Auto Electronics & Installation</p>

<input id="name" placeholder="Customer Name">
<input id="phone" placeholder="Phone (WhatsApp)">
<input id="vehicle" placeholder="Vehicle (Make & Model)">
<input id="plate" placeholder="License Plate">
<input id="service" placeholder="Service Description">
<input id="amount" placeholder="Amount ($)" type="number">

<button class="gold" onclick="generateInvoice()">GENERATE INVOICE</button>

</div>

<br>

<!-- INVOICE -->
<div class="card" id="invoice" style="display:none;">

<div style="text-align:center;">
  <h2>CAR STUDIO AUTO SERVICE</h2>
  <p style="color:#555;">Auto Electronics & Installation</p>
  <p>20 Prescott St, Jersey City</p>
  <p style="color:#0a58ca;">201-658-7295</p>
</div>

<hr>

<div style="display:flex;justify-content:space-between;">
  <strong>INVOICE</strong>
  <span id="invoiceNumber"></span>
</div>

<p><strong>Date:</strong> <span id="date"></span></p>

<hr>

<p><strong>Customer:</strong> <span id="invName"></span></p>
<p><strong>Phone:</strong> <span id="invPhone"></span></p>
<p><strong>Vehicle:</strong> <span id="invVehicle"></span></p>
<p><strong>Plate:</strong> <span id="invPlate"></span></p>

<hr>

<p><strong>Service</strong></p>
<p id="invService"></p>

<div style="text-align:right;margin-top:20px;">
  <h2 id="total" style="letter-spacing:1px;"></h2>
</div>

<hr>

<div style="text-align:center;">
  <p style="font-size:13px;color:#555;">We appreciate your business</p>
  <p style="margin-top:20px;">Authorized Signature: __________________</p>
</div>

<div class="no-print">
  <button class="gold" onclick="printInvoice()">PRINT / SAVE PDF</button>
  <button class="whatsapp" onclick="sendWhatsApp()">SEND WHATSAPP</button>
  <button class="clear" onclick="resetForm()">NEW INVOICE</button>
</div>

</div>

</div>

<script>
function generateInvoice(){
  document.getElementById("invoice").style.display = "block";

  document.getElementById("invName").innerText = document.getElementById("name").value;
  document.getElementById("invPhone").innerText = document.getElementById("phone").value;
  document.getElementById("invVehicle").innerText = document.getElementById("vehicle").value;
  document.getElementById("invPlate").innerText = document.getElementById("plate").value;
  document.getElementById("invService").innerText = document.getElementById("service").value;

  let amount = document.getElementById("amount").value || 0;
  document.getElementById("total").innerText = "TOTAL: $" + parseFloat(amount).toFixed(2);

  let now = new Date();
  document.getElementById("date").innerText = now.toLocaleString();

  let random = Math.floor(Math.random()*900 + 100);
  document.getElementById("invoiceNumber").innerText = "REC-" + random;
}

function printInvoice(){
  window.print();
}

function sendWhatsApp(){
  let phone = document.getElementById("phone").value;

  let message =
  "*CAR STUDIO AUTO SERVICE*\n" +
  "Invoice: " + document.getElementById("invoiceNumber").innerText + "\n" +
  "Date: " + document.getElementById("date").innerText + "\n\n" +
  "Customer: " + document.getElementById("invName").innerText + "\n" +
  "Vehicle: " + document.getElementById("invVehicle").innerText + "\n" +
  "Plate: " + document.getElementById("invPlate").innerText + "\n\n" +
  "Service: " + document.getElementById("invService").innerText + "\n\n" +
  document.getElementById("total").innerText;

  let url = "https://wa.me/1" + phone + "?text=" + encodeURIComponent(message);
  window.open(url, "_blank");
}

function resetForm(){
  location.reload();
}
</script>

</body>
</html>
