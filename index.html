<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CARSTUDIO</title>

<style>
body{
margin:0;
font-family:-apple-system;
background:#0B0B0B;
color:white;
}

.container{
max-width:480px;
margin:auto;
padding:20px;
}

.card{
background:white;
color:black;
border-radius:20px;
padding:25px;
box-shadow:0 20px 40px rgba(0,0,0,.3);
}

.logo{
width:180px;
margin-bottom:10px;
}

input{
width:100%;
padding:14px;
margin:8px 0;
border-radius:12px;
border:1px solid #ddd;
font-size:15px;
}

button{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:14px;
font-weight:bold;
font-size:16px;
}

.gold{
background:linear-gradient(135deg,#C9A24A,#E5C878);
}

.green{
background:#25D366;
color:white;
}

.dark{
background:#222;
color:white;
}

hr{
border:0;
border-top:1px solid #eee;
margin:15px 0;
}
</style>
</head>

<body>

<div class="container">

<!-- FORM -->
<div class="card" id="formBox" style="text-align:center;">

<!-- LOGO QUE NO FALLA -->
<img class="logo" src="data:image/svg+xml;utf8,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 600 200'>
<path d='M50 130 Q150 60 300 80 Q450 100 550 130' stroke='%23C9A24A' stroke-width='4' fill='none'/>
<text x='50%' y='150' text-anchor='middle' font-size='38' fill='%23C9A24A' font-weight='bold'>CARSTUDIO</text>
<text x='50%' y='180' text-anchor='middle' font-size='14' fill='%23C9A24A'>Auto Electronics & Installation</text>
</svg>">

<h2>CARSTUDIO</h2>
<p style="color:#C9A24A;">Auto Electronics & Installation</p>

<input id="name" placeholder="👤 Customer Name">
<input id="phone" placeholder="📞 Phone (WhatsApp)">
<input id="vehicle" placeholder="🚗 Vehicle">
<input id="plate" placeholder="🔢 Plate">
<input id="service" placeholder="🛠 Service">
<input id="amount" placeholder="💵 Amount">

<button class="gold" onclick="generate()">GENERATE INVOICE</button>
</div>

<!-- INVOICE -->
<div class="card" id="invoiceBox" style="display:none;margin-top:20px;">

<div style="text-align:center;">

<img class="logo" src="data:image/svg+xml;utf8,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 600 200'>
<path d='M50 130 Q150 60 300 80 Q450 100 550 130' stroke='%23C9A24A' stroke-width='4' fill='none'/>
<text x='50%' y='150' text-anchor='middle' font-size='38' fill='%23C9A24A' font-weight='bold'>CARSTUDIO</text>
<text x='50%' y='180' text-anchor='middle' font-size='14' fill='%23C9A24A'>Auto Electronics & Installation</text>
</svg>">

<h2>CARSTUDIO</h2>
<p>Auto Electronics & Installation</p>
<p>20 Prescott St, Jersey City</p>
<p>201-658-7295</p>

</div>

<hr>

<p><b>Invoice:</b> <span id="invoiceNumber"></span></p>
<p><b>Date:</b> <span id="date"></span></p>

<hr>

<p><b>Customer:</b> <span id="cName"></span></p>
<p><b>Phone:</b> <span id="cPhone"></span></p>
<p><b>Vehicle:</b> <span id="cVehicle"></span></p>
<p><b>Plate:</b> <span id="cPlate"></span></p>

<hr>

<p><b>Service:</b></p>
<p id="cService"></p>

<h2 id="total"></h2>

<hr>

<p style="text-align:center;font-size:13px;">No refunds after service completed</p>

<button class="gold" onclick="window.print()">🖨 PRINT</button>
<button class="green" onclick="sendWA()">📲 WHATSAPP</button>
<button class="dark" onclick="location.reload()">🔄 NEW</button>

</div>

</div>

<script>
function generate(){

document.getElementById("formBox").style.display="none";
document.getElementById("invoiceBox").style.display="block";

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let vehicle = document.getElementById("vehicle").value;
let plate = document.getElementById("plate").value;
let service = document.getElementById("service").value;
let amount = document.getElementById("amount").value;

document.getElementById("cName").innerText = name;
document.getElementById("cPhone").innerText = phone;
document.getElementById("cVehicle").innerText = vehicle;
document.getElementById("cPlate").innerText = plate;
document.getElementById("cService").innerText = service;
document.getElementById("total").innerText = "TOTAL: $" + amount;

document.getElementById("invoiceNumber").innerText = "REC-" + Math.floor(Math.random()*10000);
document.getElementById("date").innerText = new Date().toLocaleString();
}

function sendWA(){
let msg = "CARSTUDIO\nCustomer: " + document.getElementById("name").value +
"\nVehicle: " + document.getElementById("vehicle").value +
"\nService: " + document.getElementById("service").value +
"\nTotal: $" + document.getElementById("amount").value;

window.open("https://wa.me/1" + document.getElementById("phone").value + "?text=" + encodeURIComponent(msg));
}
</script>

</body>
</html>
