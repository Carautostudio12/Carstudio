<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarStudio Invoice</title>

<style>

body{
font-family:Arial, sans-serif;
background:black;
margin:0;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
}

.card{
background:white;
border-radius:20px;
padding:25px;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

/* 🔥 LOGO PREMIUM */
.logo-text{
font-size:32px;
font-weight:bold;
letter-spacing:2px;
text-align:center;
background:linear-gradient(135deg,#C9A24A,#E5C878);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:5px;
}

.sub{
text-align:center;
color:#C9A24A;
margin-bottom:20px;
font-size:14px;
}

/* INPUTS */
.input{
width:100%;
padding:14px;
margin:8px 0;
border-radius:12px;
border:1px solid #ddd;
font-size:15px;
}

/* BOTON */
.btn{
width:100%;
padding:15px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#C9A24A,#E5C878);
font-weight:bold;
font-size:16px;
cursor:pointer;
}

/* FACTURA */
.invoice{
margin-top:20px;
display:none;
}

h2{
text-align:center;
margin:10px 0;
}

.line{
border-top:1px solid #ccc;
margin:10px 0;
}

.total{
font-size:20px;
font-weight:bold;
}

.print-btn{
margin-top:15px;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="logo-text">CARSTUDIO</div>
<div class="sub">Auto Electronics & Installation</div>

<input class="input" id="name" placeholder="👤 Customer Name">
<input class="input" id="phone" placeholder="📞 Phone">
<input class="input" id="vehicle" placeholder="🚗 Vehicle">
<input class="input" id="plate" placeholder="🔢 Plate">
<input class="input" id="service" placeholder="🛠️ Service">
<input class="input" id="amount" placeholder="💵 Amount">

<button class="btn" onclick="generate()">GENERATE INVOICE</button>

</div>

<div class="card invoice" id="invoiceBox">

<div class="logo-text">CARSTUDIO</div>
<div class="sub">Auto Electronics & Installation</div>

<p><b>Date:</b> <span id="date"></span></p>

<div class="line"></div>

<p><b>Customer:</b> <span id="outName"></span></p>
<p><b>Phone:</b> <span id="outPhone"></span></p>
<p><b>Vehicle:</b> <span id="outVehicle"></span></p>
<p><b>Plate:</b> <span id="outPlate"></span></p>

<div class="line"></div>

<p><b>Service:</b></p>
<p id="outService"></p>

<p class="total">TOTAL: $<span id="outAmount"></span></p>

<div class="line"></div>

<p style="text-align:center;font-size:12px;">No refunds after service completed</p>

<button class="btn print-btn" onclick="window.print()">🖨️ PRINT</button>

</div>

</div>

<script>

function generate(){

document.getElementById("invoiceBox").style.display="block";

document.getElementById("outName").innerText = document.getElementById("name").value;
document.getElementById("outPhone").innerText = document.getElementById("phone").value;
document.getElementById("outVehicle").innerText = document.getElementById("vehicle").value;
document.getElementById("outPlate").innerText = document.getElementById("plate").value;
document.getElementById("outService").innerText = document.getElementById("service").value;
document.getElementById("outAmount").innerText = document.getElementById("amount").value;

let now = new Date();
document.getElementById("date").innerText = now.toLocaleString();

}

</script>

</body>
</html>
