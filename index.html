<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CARSTUDIO</title>

<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/Carautostudio12/Carstudio/main/87797464-6E85-4B64-AEB8-8B8EAF8FFE2.png">

<style>
body{margin:0;font-family:-apple-system;background:#0B0B0B;color:white}

</style>
</head>

<body>

<div class="container">

<div class="card" style="text-align:center;">
<img src="https://raw.githubusercontent.com/Carautostudio12/Carstudio/main/87797464-6E85-4B64-AEB8-8B8EAF8FFE2.png" class="logo">

<h2>CARSTUDIO</h2>
<p style="color:#C9A24A;">Auto Electronics & Installation</p>

<input placeholder="Customer Name">
<input placeholder="Phone">
<input placeholder="Vehicle">
<input placeholder="Plate">
<input placeholder="Service">
<input placeholder="Amount">

<button class="gold">GENERATE INVOICE</button>

</div>

</div>
